name: Project CI-CD

on:
  push:
    branches: [ "**" ]
  

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './app/package-lock.json'

      - name: Install Dependencies
        run: cd app && npm install

      - name: Run Linting
        run: cd app && npm run lint

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: ${{ vars.DOCKER_HUB_USERNAME }}/final-project:${{ github.sha }}

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/${{ vars.DOCKER_HUB_USERNAME }}/final-project:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Push Docker Image
        run: docker push ${{ vars.DOCKER_HUB_USERNAME }}/final-project:${{ github.sha }}

  cd-pipeline:
    runs-on: ubuntu-latest
    needs: ci-pipeline
    # if: github.event_name == 'pull_request' && github.base_ref == 'main'
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Check Kubeconfig and Connectivity
        id: check_conn
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG secret is missing. Skipping CD gracefully."
            echo "SKIP_CD=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          
          # Try to reach the server with a 10s timeout
          if ! kubectl cluster-info --request-timeout=10s > /dev/null 2>&1; then
            echo "Kubernetes server is unreachable (turned off). Skipping CD gracefully."
            echo "SKIP_CD=true" >> $GITHUB_OUTPUT
          else
            echo "SKIP_CD=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Deployment Image
        if: steps.check_conn.outputs.SKIP_CD != 'true'
        run: |
          # Use vars for username to avoid empty prefix
          sed -i "s|image: .*|image: ${{ vars.DOCKER_HUB_USERNAME }}/final-project:${{ github.sha }}|g" k8s/app-deployment.yaml

      - name: Deploy to Kubernetes
        if: steps.check_conn.outputs.SKIP_CD != 'true'
        run: |
          kubectl apply -f k8s/app-deployment.yaml

      - name: Force Refresh Pods
        if: steps.check_conn.outputs.SKIP_CD != 'true'
        run: |
          kubectl rollout restart deployment/nodejs-app

      - name: Verify Deployment
        if: steps.check_conn.outputs.SKIP_CD != 'true'
        run: |
          kubectl rollout status deployment/nodejs-app --timeout=120s
